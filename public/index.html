<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruralift — Smart Loan Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#060b14;color:#e2e8f0;font-family:'Space Grotesk',sans-serif;min-height:100vh;padding:40px 20px;display:flex;align-items:center;justify-content:center}
  .wrap{max-width:960px;width:100%;margin:0 auto}
  header{text-align:center;margin-bottom:40px}
  header img{height:56px;margin-bottom:14px}
  header h1{font-size:26px;font-weight:700;letter-spacing:-.5px}
  header p{color:#4a6080;font-size:14px;margin-top:6px}
  .section-title{font-size:16px;font-weight:700;color:#94a3b8;margin:36px 0 16px;letter-spacing:.5px;text-transform:uppercase;text-align:center}
  .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:18px}
  .card{background:#0d1525;border:1px solid #1a2d45;border-radius:16px;padding:28px 24px;text-decoration:none;color:#e2e8f0;transition:all .2s;display:block;text-align:center}
  .card:hover{border-color:#7c3aed;transform:translateY(-3px);box-shadow:0 8px 28px rgba(124,58,237,.18)}
  .card .icon{font-size:36px;margin-bottom:12px}
  .card h2{font-size:17px;font-weight:700;margin-bottom:4px}
  .card p{color:#4a6080;font-size:12px;margin:0}

  /* Footer links */
  .footer-links{display:flex;justify-content:center;gap:24px;margin-top:48px;padding-top:24px;border-top:1px solid #1a2d45}
  .footer-links a{color:#64748b;text-decoration:none;font-size:13px;font-weight:600;transition:color .2s}
  .footer-links a:hover{color:#7c3aed}

  /* ── Responsive: Tablet (max-width: 768px) ── */
  @media(max-width:768px){
    body{padding:28px 16px}
    header h1{font-size:22px}
    .cards{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
    .card{padding:22px 18px}
    .footer-links{gap:16px;margin-top:36px;padding-top:20px}
  }

  /* ── Responsive: Phone (max-width: 600px) ── */
  @media(max-width:600px){
    body{padding:20px 12px}
    header{margin-bottom:28px}
    header img{height:44px;margin-bottom:10px}
    header h1{font-size:20px}
    header p{font-size:12px}
    .section-title{font-size:14px;margin:24px 0 12px}
    .cards{grid-template-columns:1fr;gap:12px}
    .card{padding:20px 16px;border-radius:12px}
    .card .icon{font-size:28px;margin-bottom:8px}
    .card h2{font-size:15px}
    .card p{font-size:11px}
    .footer-links{flex-direction:column;align-items:center;gap:12px;margin-top:32px}
    .footer-links a{font-size:12px}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <img src="/logo.png" alt="Ruralift">
    <h1>Smart Loan Hub</h1>
    <p>Auto Lead Dialing System &mdash; Support From Emerging India</p>
  </header>

  <div class="section-title">&#128274; System Access</div>
  <div class="cards">
    <a href="/admin" class="card">
      <div class="icon">&#128736;&#65039;</div>
      <h2>Admin Panel</h2>
      <p>Upload numbers, view stats, manage leads</p>
    </a>
    <a href="/agent" class="card">
      <div class="icon">&#128222;</div>
      <h2>Agent Dialer</h2>
      <p>Login and start dialing leads</p>
    </a>
    <a href="/tl" class="card">
      <div class="icon">&#128100;</div>
      <h2>TL Panel</h2>
      <p>Team Lead dashboard &amp; agent dialer</p>
    </a>
  </div>

  <div class="footer-links">
    <a href="/admin">Admin</a>
    <a href="/agent">Agent Dialer</a>
    <a href="/tl">TL Panel</a>
  </div>
</div>
</body>
</html>
